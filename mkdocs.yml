site_name: Data-Centric Security on AWS
site_description: Concepts, hands-on labs, reference architectures, operational scenarios, and solution patterns for coalition data sharing using Data-Centric Security
site_url: https://iamtgray.github.io/dcs-data-exchange/

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: deep orange
  features:
    - navigation.footer
    - navigation.indexes
    - navigation.top
    - navigation.sections
    - toc.integrate
    - content.code.copy
  icon:
    logo: material/shield-lock

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - attr_list
  - md_in_html
  - def_list
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

